version: "3.9"

services:
  web:
    build: .
    container_name: portfolio
    command: /entrypoint.sh
    ports:
      - "${WEB_PORT}:5012"
    volumes:
      - portfolio:/app/media/
      - static_data:/app/staticfiles/
    depends_on:
      - redis
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal

  celery:
    build: .
    container_name: portfolio_celery
    command: celery -A config worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal

  beat:
    build: .
    container_name: portfolio_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - redis
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7
    restart: unless-stopped
    container_name: redis_portfolio
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    # Puerto no expuesto al host; accesible solo en la red interna
    networks:
      - internal

volumes:
  portfolio:
  static_data:

networks:
  internal:
    driver: bridge