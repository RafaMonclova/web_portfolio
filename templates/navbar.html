<aside id="navbar-aside" class="fixed top-0 left-0 h-screen bg-gray-950/95 backdrop-blur-sm text-gray-400 flex flex-col items-center py-5 shadow-[4px_0_24px_rgba(0,0,0,0.4)] z-50 transition-all duration-300 ease-in-out w-16 border-r border-gray-800/50">

    <!-- Botón burger/flecha -->
    <button id="navbar-toggle" class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-800/60 hover:bg-gray-700/80 hover:text-cyan-400 transition-all duration-200 mb-8">
        <i id="navbar-icon" data-lucide="menu" class="w-6 h-6 text-cyan-400"></i>
    </button>

    <!-- Separador -->
    <div class="w-8 h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent mb-6 navbar-separator"></div>

    <!-- Menú principal -->
    <nav id="navbar-menu" class="flex-1 flex flex-col items-center space-y-1 w-full px-2 transition-all duration-300">
        <a href="{% url 'home' %}" class="group navbar-btn w-full relative flex items-center rounded-xl px-0 py-2.5 justify-center hover:bg-gray-800/60 transition-all duration-200">
            <div class="navbar-icon-wrap flex items-center justify-center w-6 shrink-0">
                <i data-lucide="home" class="w-5 h-5 group-hover:text-cyan-400 transition-colors duration-200"></i>
            </div>
            <span class="navbar-title ml-3 whitespace-nowrap text-sm font-medium opacity-0 w-0 overflow-hidden transition-all duration-300 pointer-events-none group-hover:text-white">Home</span>
            <!-- Tooltip (solo visible en modo collapsed) -->
            <span class="navbar-tooltip absolute left-full ml-3 top-1/2 -translate-y-1/2 bg-gray-800 text-gray-200 text-xs font-medium px-3 py-1.5 rounded-lg shadow-lg opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap">Home</span>
        </a>
        <a href="{% url 'blog_list' %}" class="group navbar-btn w-full relative flex items-center rounded-xl px-0 py-2.5 justify-center hover:bg-gray-800/60 transition-all duration-200">
            <div class="navbar-icon-wrap flex items-center justify-center w-6 shrink-0">
                <i data-lucide="book-open" class="w-5 h-5 group-hover:text-cyan-400 transition-colors duration-200"></i>
            </div>
            <span class="navbar-title ml-3 whitespace-nowrap text-sm font-medium opacity-0 w-0 overflow-hidden transition-all duration-300 pointer-events-none group-hover:text-white">Blog</span>
            <span class="navbar-tooltip absolute left-full ml-3 top-1/2 -translate-y-1/2 bg-gray-800 text-gray-200 text-xs font-medium px-3 py-1.5 rounded-lg shadow-lg opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap">Blog</span>
        </a>
        <a href="{% url 'project_list' %}" class="group navbar-btn w-full relative flex items-center rounded-xl px-0 py-2.5 justify-center hover:bg-gray-800/60 transition-all duration-200">
            <div class="navbar-icon-wrap flex items-center justify-center w-6 shrink-0">
                <i data-lucide="album" class="w-5 h-5 group-hover:text-cyan-400 transition-colors duration-200"></i>
            </div>
            <span class="navbar-title ml-3 whitespace-nowrap text-sm font-medium opacity-0 w-0 overflow-hidden transition-all duration-300 pointer-events-none group-hover:text-white">Proyectos</span>
            <span class="navbar-tooltip absolute left-full ml-3 top-1/2 -translate-y-1/2 bg-gray-800 text-gray-200 text-xs font-medium px-3 py-1.5 rounded-lg shadow-lg opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap">Mis Proyectos</span>
        </a>
    </nav>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('navbar-toggle');
        const icon = document.getElementById('navbar-icon');
        const aside = document.getElementById('navbar-aside');
        const titles = document.querySelectorAll('.navbar-title');
        const tooltips = document.querySelectorAll('.navbar-tooltip');
        const links = document.querySelectorAll('.navbar-btn');
        const separator = document.querySelector('.navbar-separator');
        let expanded = false;

        function setNavbar(expand) {
            expanded = expand;
            if (expand) {
                aside.classList.remove('w-16');
                aside.classList.add('w-52');
                icon.setAttribute('data-lucide', 'arrow-left');

                // Mostrar títulos inline
                titles.forEach(t => {
                    t.classList.remove('opacity-0', 'w-0', 'overflow-hidden', 'pointer-events-none');
                    t.classList.add('opacity-100', 'w-auto');
                });
                // Ocultar tooltips
                tooltips.forEach(t => {
                    t.classList.add('!hidden');
                });
                // Alinear links a la izquierda con padding
                links.forEach(l => {
                    l.classList.remove('justify-center', 'px-0');
                    l.classList.add('justify-start', 'px-3');
                });
                // Ensanchar separador
                if (separator) {
                    separator.classList.remove('w-8');
                    separator.classList.add('w-full', 'px-3');
                }
            } else {
                aside.classList.remove('w-52');
                aside.classList.add('w-16');
                icon.setAttribute('data-lucide', 'menu');

                // Ocultar títulos
                titles.forEach(t => {
                    t.classList.add('opacity-0', 'w-0', 'overflow-hidden', 'pointer-events-none');
                    t.classList.remove('opacity-100', 'w-auto');
                });
                // Mostrar tooltips
                tooltips.forEach(t => {
                    t.classList.remove('!hidden');
                });
                // Centrar links
                links.forEach(l => {
                    l.classList.add('justify-center', 'px-0');
                    l.classList.remove('justify-start', 'px-3');
                });
                // Reducir separador
                if (separator) {
                    separator.classList.add('w-8');
                    separator.classList.remove('w-full', 'px-3');
                }
            }
            if (window.lucide) lucide.createIcons();
        }

        setNavbar(false);
        toggleBtn.addEventListener('click', function() {
            setNavbar(!expanded);
        });
    });
</script>

    <!-- Separador inferior -->
    <div class="w-8 h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent my-4 navbar-separator"></div>

    <div class="mb-4 flex flex-col items-center">
        {% if user.is_authenticated %}
            <!-- Menú con inicial -->
            <div class="relative">
                <!-- Avatar que abre el menú -->
                <button id="user-menu-btn" class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-cyan-700 flex items-center justify-center font-bold text-white cursor-pointer hover:from-cyan-400 hover:to-cyan-600 transition-all duration-200 shadow-lg shadow-cyan-900/30">
                    {{ user.username|first|upper }}
                </button>

                <!-- Dropdown (oculto por defecto) -->
                <div id="user-menu"
                    class="absolute left-14 bottom-0 mb-2 hidden flex-col bg-gray-800/95 backdrop-blur-sm text-sm rounded-xl shadow-xl border border-gray-700/50 min-w-[160px] overflow-hidden">
                    <a href="{% url 'home' %}" class="px-4 py-2.5 hover:bg-gray-700/60 hover:text-white block transition-colors duration-150">{{ user.username }}</a>
                    <div class="h-px bg-gray-700/50"></div>
                    <a href="{% url 'logout' %}" class="px-4 py-2.5 hover:bg-gray-700/60 hover:text-red-400 block transition-colors duration-150">Cerrar sesión</a>
                </div>
            </div>
        {% else %}
            <!-- Botón login -->
            <a href="{% url 'login' %}" class="group relative w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-800/60 transition-all duration-200">
                <i data-lucide="log-in" class="w-5 h-5 group-hover:text-cyan-400 transition-colors duration-200"></i>
                <span class="absolute left-full ml-3 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 bg-gray-800 text-gray-200 text-xs font-medium px-3 py-1.5 rounded-lg shadow-lg transition-opacity duration-200 whitespace-nowrap">Acceso</span>
            </a>
        {% endif %}
    </div>

    <!-- Footer con redes -->
    <div class="flex flex-col items-center space-y-3">
        <a href="https://github.com/RafaMonclova" target="_blank" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-800/60 hover:text-white transition-all duration-200">
            <i data-lucide="github" class="w-4 h-4"></i>
        </a>
        <a href="https://www.linkedin.com/in/rafael-monclova-suano-a9a088142/" target="_blank" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-800/60 hover:text-white transition-all duration-200">
            <i data-lucide="linkedin" class="w-4 h-4"></i>
        </a>
        <a href="mailto:rafamonclova37@gmail.com" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-800/60 hover:text-white transition-all duration-200">
            <i data-lucide="mail" class="w-4 h-4"></i>
        </a>
    </div>
</aside>
